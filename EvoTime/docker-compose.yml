version: '3.8'

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - evotime_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django / Gunicorn ─────────────────────────────────────────────────────
  web:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && gunicorn EvoTime.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

volumes:
  evotime_postgres_data:
