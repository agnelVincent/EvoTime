# ─────────────────────────────────────────────────────────────────────────────
# EvoTime — docker-compose.yml (Production, EC2 co-deployment)
#
# COEXISTENCE STRATEGY with MotoReach on the same EC2 instance:
#
#   MotoReach already occupies:
#     • host port 8000  (daphne backend)
#     • host port 5432  (postgres, exposed to host)
#     • host port 6379  (redis, exposed to host)
#     • docker volume named "postgres_data"
#
#   EvoTime avoids ALL conflicts by:
#     • Binding to host port 8001  (maps to internal container port 8000)
#     • NOT exposing the Postgres port to the host at all — the "web" service
#       connects to "db" over the private Docker bridge network (service name "db",
#       port 5432 is reachable internally by its service name only)
#     • Using uniquely-prefixed volume names: "evotime_postgres_data"
#     • No Redis service required (EvoTime is a standard WSGI/sync Django app)
#
# Host Nginx (already running on EC2) will proxy:
#     evotime.duckdns.org  →  127.0.0.1:8001  (this compose's web service)
#     motoreach.duckdns.org → 127.0.0.1:8000  (MotoReach — untouched)
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ── PostgreSQL (internal only — no host port mapping) ─────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      # Unique prefix "evotime_" prevents collision with MotoReach's "postgres_data"
      - evotime_postgres_data:/var/lib/postgresql/data
    # ⚠️  NO "ports:" block here intentionally.
    # "web" reaches this at hostname "db", port 5432 over the Docker bridge network.
    # Exposing 5432 to the host would clash with MotoReach's already-bound 5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django / Gunicorn ─────────────────────────────────────────────────────
  web:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy     # wait until Postgres is actually ready
    ports:
      # HOST 8001 → CONTAINER 8000
      # 8001 is free on the EC2 instance; MotoReach occupies 8000.
      - "8001:8000"
    volumes:
      # Static files volume — Nginx on the host can serve these directly
      # if you want to later mount the volume path into Nginx. For now
      # gunicorn serves them (whitenoise or Django's static views in dev).
      - evotime_static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn EvoTime.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120"

volumes:
  evotime_postgres_data:   # isolated from MotoReach's "postgres_data"
  evotime_static:
