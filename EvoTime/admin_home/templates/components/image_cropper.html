<!-- admin_home/templates/components/image_cropper.html -->
<div id="unifiedCropperModal" class="hidden fixed inset-0 overflow-y-auto" style="z-index: 99999;" aria-labelledby="cropper-modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div class="fixed inset-0 bg-gray-900/90 backdrop-blur-md transition-opacity" style="z-index: -1;" aria-hidden="true" onclick="UnifiedCropper.close()"></div>
        
        <!-- Trick to center modal -->
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        
        <!-- Modal panel -->
        <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl w-full border border-gray-100 relative">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <h3 class="text-lg font-semibold text-gray-800" id="cropper-modal-title">Adjust Image</h3>
                <button type="button" onclick="UnifiedCropper.close()" class="text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full p-2 transition-all duration-200 focus:outline-none">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Body -->
            <div class="p-6 bg-gray-50 flex justify-center items-center">
                <div class="w-full h-80 sm:h-96 bg-gray-200 rounded-xl overflow-hidden shadow-inner flex items-center justify-center relative">
                    <img id="unifiedCropperImage" src="" alt="Image to crop" class="max-w-full max-h-full block opacity-0 transition-opacity duration-300">
                    <div id="cropperLoading" class="absolute inset-0 flex items-center justify-center bg-gray-100 bg-opacity-75 hidden">
                        <i class="fas fa-spinner fa-spin text-3xl text-blue-600"></i>
                    </div>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="px-6 py-4 bg-white border-t border-gray-100 flex items-center justify-between">
                <!-- Tools (Rotate) -->
                <div class="flex gap-2">
                    <button type="button" onclick="UnifiedCropper.rotate(-90)" class="p-2.5 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors focus:outline-none" title="Rotate Left">
                        <i class="fas fa-undo"></i>
                    </button>
                    <button type="button" onclick="UnifiedCropper.rotate(90)" class="p-2.5 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors focus:outline-none" title="Rotate Right">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>
                
                <div class="flex gap-3">
                    <button type="button" onclick="UnifiedCropper.close()" class="px-5 py-2.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-600 bg-white hover:bg-gray-50 hover:text-gray-900 transition-all focus:ring-2 focus:ring-offset-2 focus:ring-gray-200">
                        Cancel
                    </button>
                    <button type="button" onclick="UnifiedCropper.cropAndSave(this)" class="px-6 py-2.5 rounded-xl border border-transparent shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 hover:shadow-md transition-all focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex items-center gap-2">
                        <i class="fas fa-check"></i> Apply Crop
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Customizing the Cropper.js UI to make it look premium */
.cropper-view-box,
.cropper-face {
    border-radius: 8px; /* Slightly rounded crop box for modern look */
}
.cropper-line, .cropper-point {
    background-color: #2563eb; /* Tailwind blue-600 */
}
.cropper-point.point-se {
    width: 8px;
    height: 8px;
}
.cropper-bg {
    background-image: none;
    background-color: transparent; /* Cleaner background */
}
.cropper-modal {
    background-color: rgba(0, 0, 0, 0.6); /* Slightly darker overlay around the crop area */
}
</style>

<script>
    const UnifiedCropper = (function() {
        let cropperInstance = null;
        let currentFileInput = null;
        let onCropCallback = null;
        
        const modal = document.getElementById('unifiedCropperModal');
        const imageElement = document.getElementById('unifiedCropperImage');
        const loadingElement = document.getElementById('cropperLoading');

        function open(fileInput, options = {}) {
            const file = fileInput.files[0];
            if (!file) return;

            // Ensure we are working with an image
            if (!file.type.startsWith('image/')) {
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        icon: 'error',
                        title: 'Invalid File',
                        text: 'Please select an image file to crop.',
                        background: '#fff',
                        color: '#1f2937'
                    });
                } else {
                    alert("Please select an image file to crop.");
                }
                fileInput.value = ''; // clear
                return;
            }

            currentFileInput = fileInput;
            onCropCallback = options.onCrop || null;
            
            const aspectRatio = options.aspectRatio !== undefined ? options.aspectRatio : 1; // default square

            // Show loading
            loadingElement.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                imageElement.src = e.target.result;
                imageElement.style.opacity = '1';
                
                modal.classList.remove('hidden');

                if (cropperInstance) {
                    cropperInstance.destroy();
                }

                // Add slight delay to allow modal display before initializing cropper
                setTimeout(() => {
                    cropperInstance = new Cropper(imageElement, {
                        aspectRatio: aspectRatio,
                        viewMode: 2,
                        autoCropArea: 0.9,
                        background: false,
                        modal: true,
                        guides: true,
                        center: true,
                        highlight: false,
                        dragMode: 'move', // Allow moving the image inside the crop box
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        toggleDragModeOnDblclick: false,
                        ready: function() {
                            loadingElement.classList.add('hidden');
                        }
                    });
                }, 150);
            };
            reader.readAsDataURL(file);
        }

        function close() {
            modal.classList.add('hidden');
            if (cropperInstance) {
                cropperInstance.destroy();
                cropperInstance = null;
            }
            imageElement.src = '';
            imageElement.style.opacity = '0';
            loadingElement.classList.add('hidden');
            
            currentFileInput = null;
            onCropCallback = null;
        }

        function rotate(degree) {
            if (cropperInstance) {
                cropperInstance.rotate(degree);
            }
        }

        function cropAndSave(btnElement) {
            if (!cropperInstance || !currentFileInput) return;

            // Show loading on apply button
            const applyBtn = btnElement || (typeof event !== 'undefined' ? event.currentTarget : null);
            const originalContent = applyBtn ? applyBtn.innerHTML : '';
            if (applyBtn) {
                applyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                applyBtn.disabled = true;
            }

            const canvas = cropperInstance.getCroppedCanvas({
                width: 800, // Maximum width to keep file sizes manageable
                height: 800, // Maximum height
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            canvas.toBlob(function(blob) {
                const originalFile = currentFileInput.files[0];
                const fileName = originalFile ? originalFile.name : 'cropped_image.jpg';
                const fileType = originalFile ? originalFile.type : 'image/jpeg';
                
                const croppedFile = new File([blob], fileName, { type: fileType });
                
                // Replace the file inside the input using DataTransfer
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(croppedFile);
                currentFileInput.files = dataTransfer.files;

                // Fire an event in case other listeners need to know the file changed
                const changeEvent = new Event('change', { bubbles: true, cancelable: true });
                changeEvent.cropperInternal = true; // Properly set custom property so listeners ignore it
                currentFileInput.dispatchEvent(changeEvent);

                // Invoke callback if provided
                if (typeof onCropCallback === 'function') {
                    onCropCallback(croppedFile, canvas.toDataURL(fileType));
                }

                // Show success toast
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        icon: 'success',
                        title: 'Image cropped successfully',
                        showConfirmButton: false,
                        timer: 2500,
                        background: '#10B981', // emerald green
                        color: '#ffffff',
                        iconColor: '#ffffff'
                    });
                }

                // Restore button state (though modal is closing)
                if (applyBtn) {
                    applyBtn.innerHTML = originalContent;
                    applyBtn.disabled = false;
                }

                close();
            }, 'image/jpeg', 0.9);
        }

        return {
            open: open,
            close: close,
            cropAndSave: cropAndSave,
            rotate: rotate
        };
    })();
</script>
