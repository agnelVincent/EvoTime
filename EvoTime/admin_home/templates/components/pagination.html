<!-- admin_home/templates/components/pagination.html -->
{% if page_obj %}
<div class="flex justify-center mt-8">
    <nav class="inline-flex rounded-md shadow-sm overflow-hidden" aria-label="Pagination">
        {% if page_obj.has_previous %}
            <a href="?page=1" class="px-4 py-2 bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition-colors">First</a>
            <a href="?page={{ page_obj.previous_page_number }}" class="px-4 py-2 bg-white border-t border-b border-r border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-chevron-left"></i>
            </a>
        {% endif %}

        <span class="px-4 py-2 bg-blue-50 border border-blue-300 text-sm font-medium text-blue-700">
            Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
        </span>

        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}" class="px-4 py-2 bg-white border-t border-b border-l border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="?page={{ page_obj.paginator.num_pages }}" class="px-4 py-2 bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition-colors">Last</a>
        {% endif %}
    </nav>
</div>
{% endif %}
