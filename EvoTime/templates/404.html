<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .error-content {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .error-icon {
            font-size: 6rem;
            color: #3b82f6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <h1 class="text-4xl font-bold text-gray-800 mb-4">404 - Page Not Found</h1>
            <p class="text-gray-600 mb-6">
                Oops! The page you are looking for seems to have gone on an unexpected adventure.
                It might have been moved, deleted, or never existed in the first place.
            </p>
            <div class="flex justify-center space-x-4">
                <a href="/" class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition duration-300 ease-in-out">
                    <i class="fas fa-home mr-2"></i>Return to Home
                </a>
                <a href="/contact" class="px-6 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition duration-300 ease-in-out">
                    <i class="fas fa-envelope mr-2"></i>Contact Support
                </a>
            </div>
            <div class="mt-8 text-sm text-gray-500">
                Error Code: 404 | <span id="timestamp"></span>
            </div>
        </div>
    </div>

    <script>
        // Update timestamp dynamically
        document.getElementById('timestamp').textContent = 
            new Date().toLocaleString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
    </script>
</body>
</html>
