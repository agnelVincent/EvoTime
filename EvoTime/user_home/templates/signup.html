
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Signup - EvoTime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.8);
        }
        .gradient-bg {
            background: linear-gradient(135deg, rgba(100, 100, 255, 0.8), rgba(30, 144, 255, 0.8));
            transition: background 0.3s ease;
        }
        .gradient-bg:hover {
            background: linear-gradient(135deg, rgba(70, 70, 255, 0.9), rgba(0, 102, 204, 0.9));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="overlay absolute inset-0"></div>

    <div class="w-full max-w-md bg-white/10 backdrop-blur-md rounded-xl shadow-2xl p-6 relative z-10 border border-white/10">
        <div class="flex justify-center mb-6">
            <img src="{% static 'evo_time-removebg.png' %}" alt="EvoTime Logo" class="w-16 h-16">
        </div>

        <h2 class="text-2xl font-bold text-center text-white mb-4">
            Create an Account
        </h2>

        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    {% if message.tags == 'error' %}
                        <div class="px-4 py-2 text-sm rounded-lg bg-red-50 text-red-600">
                            {{ message }}
                        </div>
                    {% endif %}
                {% endfor %}
            </div>
        {% endif %}

        <form action="{% url 'user_signup' %}" method="POST" class="space-y-4" enctype="multipart/form-data">
            {% csrf_token %}

            <div>
                <label for="full_name" class="block text-sm font-medium text-white mb-1">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required class="w-full px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-white/50 text-sm transition-all">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-white mb-1">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required class="w-full px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-white/50 text-sm transition-all">
            </div>

            <div>
                <label for="phone_number" class="block text-sm font-medium text-white mb-1">Phone Number</label>
                <input type="tel" id="phone_number" name="phone_number" placeholder="Enter your phone number" required class="w-full px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-white/50 text-sm transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-white mb-1">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required class="w-full px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-white/50 text-sm transition-all">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-white mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required class="w-full px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-white/50 text-sm transition-all">
            </div>

            <button type="submit" class="w-full gradient-bg text-white text-sm font-semibold py-2 rounded-lg shadow-md hover:shadow-lg transition-all">Sign Up</button>
        </form>

        <div class="flex items-center my-4">
            <div class="flex-grow border-t border-white/20"></div>
            <span class="mx-3 text-white/50 text-sm">OR</span>
            <div class="flex-grow border-t border-white/20"></div>
        </div>

        <p class="mt-4 text-center text-sm text-white/80">
            Already have an account? 
            <a href="{% url 'user_login' %}" class="text-blue-300 hover:text-blue-200 font-medium transition-colors">Log in here</a>
        </p>
    </div>

</body>
</html>
