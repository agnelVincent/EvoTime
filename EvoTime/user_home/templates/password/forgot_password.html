{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – EvoTime</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Favicon -->
  <link rel="icon" type="image/jpg" href="{% static 'evo_time-removebg.png' %}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: #020617; /* slate-950 */
      color: #f8fafc;
    }

    /* Floating Orbs */
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(6%, 8%) scale(1.15); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1.1); }
      50% { transform: translate(-6%, -8%) scale(0.95); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-4%, 4%) scale(1.05); }
    }
    .animate-float-1 { animation: float1 20s ease-in-out infinite; }
    .animate-float-2 { animation: float2 24s ease-in-out infinite; }
    .animate-float-3 { animation: float3 16s ease-in-out infinite; }

    /* Shifting Gradient Button */
    .gradient-btn {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #6366f1 100%);
      background-size: 200% auto;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .gradient-btn:hover {
      background-position: right center;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
      transform: translateY(-1.5px);
    }
    .gradient-btn:active {
      transform: translateY(0);
    }

    /* Glass Card */
    .glass-card {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Custom Input Focus */
    .glass-input {
      background: rgba(2, 6, 23, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-input:focus {
      background: rgba(2, 6, 23, 0.6);
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden px-4">

  <!-- Decorative floating background orbs (Mesh Gradient) -->
  <div class="fixed top-[-15%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/10 blur-[130px] pointer-events-none animate-float-1"></div>
  <div class="fixed bottom-[-15%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-600/10 blur-[130px] pointer-events-none animate-float-2"></div>
  <div class="fixed top-[35%] left-[55%] w-[35vw] h-[35vw] rounded-full bg-indigo-600/5 blur-[120px] pointer-events-none animate-float-3"></div>

  <!-- Back to Login arrow button -->
  <a href="{% url 'user_login' %}"
     class="absolute top-6 left-6 flex items-center gap-2 text-slate-400 hover:text-white bg-slate-900/40 hover:bg-slate-800/60 px-4 py-2 rounded-xl transition-all border border-slate-800 backdrop-blur-md text-sm font-semibold group z-20 shadow-sm">
    <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Back to Login
  </a>

  <!-- Forgot Password Card -->
  <div class="w-full max-w-md glass-card rounded-3xl p-8 relative z-10">
    
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-slate-800/40 flex items-center justify-center p-3 border border-slate-700/50 shadow-inner">
        <img src="{% static 'evo_time-removebg.png' %}" alt="EvoTime Logo" class="w-full h-full object-contain">
      </div>
    </div>

    <!-- Headers -->
    <h2 class="text-3xl font-extrabold text-center text-white tracking-tight">Forgot Password</h2>
    <p class="text-center text-slate-400 text-sm mt-1.5 mb-8 font-medium">Enter your email to receive an OTP</p>

    <!-- Error/Success Messages Block -->
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
          <div class="px-4 py-3 text-sm rounded-xl flex items-center gap-2 {% if message.tags == 'error' %}bg-red-500/10 border border-red-500/20 text-red-200{% else %}bg-emerald-500/10 border border-emerald-500/20 text-emerald-200{% endif %}">
            <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle text-red-400{% else %}fa-check-circle text-emerald-400{% endif %}"></i>
            <span>{{ message }}</span>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <!-- Form -->
    <form action="{% url 'forgot_password' %}" method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Email Address Field -->
      <div>
        <label for="email" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Email Address</label>
        <div class="relative">
          <i class="far fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
          <input type="email"
                 id="email"
                 name="email"
                 placeholder="Enter your email"
                 required
                 class="glass-input w-full pl-11 pr-4 py-3 text-sm rounded-xl text-slate-100 placeholder-slate-600 focus:outline-none">
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full gradient-btn text-white text-sm font-bold py-3.5 rounded-xl shadow-md mt-2">
        Send OTP
      </button>
    </form>

    <!-- Footer Back CTA -->
    <p class="text-xs text-center text-slate-400 mt-8 font-medium">
      Remembered your password? 
      <a href="{% url 'user_login' %}"
         class="text-indigo-400 hover:text-indigo-300 font-bold ml-1 transition-colors">
        Log in
      </a>
    </p>
  </div>
</body>
</html>
